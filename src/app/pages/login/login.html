<section class="min-h-screen flex items-center justify-center bg-background px-8">
  <div class="max-w-md w-full bg-surface-container-low p-12 rounded-[3rem] editorial-shadow text-center relative overflow-hidden">
    <div class="absolute -top-10 -right-10 w-32 h-32 bg-primary/10 rounded-full blur-2xl"></div>

    <h2 class="text-4xl font-headline font-bold tracking-tighter mb-4 text-on-surface">
      Welcome <span class="text-primary italic">Back.</span>
    </h2>
    <p class="text-on-surface-variant mb-10 text-balance leading-relaxed">
      Connect your account to start syncing your health metrics to Notion.
    </p>

    <button (click)="handleLogin()"
            class="w-full flex items-center justify-center gap-4 bg-white border border-outline-variant py-4 px-6 rounded-full hover:bg-surface-container-high transition-all group">
      <svg class="w-6 h-6" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.64,4.657-6.062,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.345,43.611,20.083z"></path>
        <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"></path>
        <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"></path>
        <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.345,43.611,20.083z"></path>
      </svg>
      <span class="text-on-surface font-bold">Continue with Google</span>
    </button>

    <p class="mt-8 text-xs text-on-surface-variant/60">
      By continuing, you agree to our 
      <a [routerLink]="['/terms']" class="underline hover:text-primary">Terms</a> and 
      <a [routerLink]="['/privacy']" class="underline hover:text-primary">Privacy</a>.
    </p>
  </div>
</section>
