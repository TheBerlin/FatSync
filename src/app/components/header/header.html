<nav class="nav-container relative">
  <div class="nav-inner flex items-center justify-between">
    <div class="nav-logo text-2xl font-bold tracking-tighter">FatSync</div>

    <div class="nav-links hidden md:flex items-center gap-6">
      <a
        [routerLink]="['/']"
        class="nav-link text-sm font-medium hover:text-primary transition-colors"
        >Home</a
      >
      <a
        [routerLink]="['/']"
        fragment="process"
        class="nav-link text-sm font-medium hover:text-primary transition-colors"
        >Process</a
      >
      <a
        [routerLink]="['/']"
        fragment="security"
        class="nav-link text-sm font-medium hover:text-primary transition-colors"
        >Security</a
      >
      <a
        [routerLink]="['/']"
        fragment="pricing"
        class="nav-link text-sm font-medium hover:text-primary transition-colors"
        >Pricing</a
      >
    </div>

    <div class="nav-actions flex items-center">
      <div class="hidden md:flex items-center gap-4">
        @if (supabase.currentUser()) {
          <a [routerLink]="['/dashboard']" class="nav-link mr-2">Dashboard</a>

          <div class="relative group flex items-center justify-center">
            <app-button (click)="supabase.signOut()" variant="secondary" size="sm">
              Logout
            </app-button>

            <div
              class="absolute top-full mt-3 px-4 py-2 bg-inverse-surface text-surface text-xs font-bold rounded-2xl opacity-0 group-hover:opacity-100 transition-all duration-300 pointer-events-none whitespace-nowrap editorial-shadow z-50 translate-y-[-10px] group-hover:translate-y-0"
            >
              Currently signed in as
              <span class="text-primary-container">{{ supabase.currentUser()?.email }}</span>
              <div
                class="absolute -top-1 left-1/2 -translate-x-1/2 w-2 h-2 bg-inverse-surface rotate-45"
              ></div>
            </div>
          </div>
        } @else {
          <app-button [link]="['/login']" variant="primary" size="sm"> Connect </app-button>
        }
      </div>

      <button
        (click)="toggleMenu()"
        class="flex md:hidden items-center gap-2 ml-4 z-[70] bg-transparent border-none cursor-pointer"
      >
        <span class="text-sm font-bold uppercase tracking-wider">{{
          isMenuOpen ? 'Close' : 'Menu'
        }}</span>
        <hugeicons-icon
          [icon]="isMenuOpen ? CloseIcon : MenuIcon"
          [size]="22"
          color="#000000"
          [strokeWidth]="2"
        ></hugeicons-icon>
      </button>
    </div>
  </div>

  <div
    class="fixed top-0 right-0 h-screen w-[300px] bg-white shadow-2xl z-[60] transform transition-transform duration-500 ease-in-out p-10 pt-24 flex flex-col md:hidden"
    [class.translate-x-0]="isMenuOpen"
    [class.translate-x-full]="!isMenuOpen"
  >
    <div class="flex flex-col gap-8">
      <a [routerLink]="['/']" (click)="toggleMenu()" class="text-2xl font-bold">Home</a>
      <a
        [routerLink]="['/']"
        fragment="process"
        (click)="toggleMenu()"
        class="text-2xl font-bold text-on-surface-variant"
        >Process</a
      >
      <a
        [routerLink]="['/']"
        fragment="security"
        (click)="toggleMenu()"
        class="text-2xl font-bold text-on-surface-variant"
        >Security</a
      >
      <a
        [routerLink]="['/']"
        fragment="pricing"
        (click)="toggleMenu()"
        class="text-2xl font-bold text-on-surface-variant"
        >Pricing</a
      >

      <div class="h-[1px] bg-black/5 my-4"></div>

      @if (supabase.currentUser()) {
        <div class="flex flex-col gap-4">
          <p class="text-xs text-on-surface-variant font-bold uppercase tracking-widest">Account</p>
          <a
            [routerLink]="['/dashboard']"
            (click)="toggleMenu()"
            class="text-2xl font-bold text-primary"
            >Dashboard</a
          >
          <a
            [routerLink]="['/']"
            fragment="pricing"
            (click)="supabase.signOut()"
            class="text-2xl font-bold text-red-500"
            >Logout
            <hugeicons-icon
              [icon]="LogoutIcon"
              [size]="22"
              color="#000000"
              [strokeWidth]="2"
            ></hugeicons-icon
          ></a>
        </div>
      } @else {
        <app-button [link]="['/login']" (click)="toggleMenu()" variant="primary" size="lg"
          >Log in</app-button
        >
      }
    </div>
  </div>

  @if (isMenuOpen) {
    <div
      (click)="toggleMenu()"
      class="fixed inset-0 bg-black/40 backdrop-blur-md z-[50] md:hidden transition-all duration-500"
    ></div>
  }
</nav>
